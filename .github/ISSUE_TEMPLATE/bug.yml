name: Bug
description: Report a defect using non-sensitive reproduction details.
title: "[Bug]: "
labels: ["bug"]
assignees: ["bcroc"]
body:
  - type: markdown
    attributes:
      value: "Keep reports privacy-first. Use synthetic names, matters, emails, files, and payment data."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Minimal steps with synthetic data only.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Note affected workflow, severity, and any safe workaround.
    validations:
      required: false
