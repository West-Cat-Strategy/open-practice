name: Agent task
description: Ask an agent to plan or execute a bounded repo task.
title: "[Agent]: "
labels: ["agent-ready", "agent-safe", "risk:low", "needs-human-review"]
assignees: ["bcroc"]
body:
  - type: markdown
    attributes:
      value: "Use this only for low-risk agent-ready work. Use synthetic data only. Do not include client, matter, credential, or private deployment details."
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the requested outcome and owned paths.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note privacy, security, policy, or validation constraints.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List checks the agent should run or explain why they are skipped.
    validations:
      required: false
