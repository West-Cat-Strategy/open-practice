version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 4
    assignees:
      - "bcroc"
    labels:
      - "dependencies"
      - "npm"
    groups:
      dev-tooling-low-risk:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Vancouver"
    open-pull-requests-limit: 2
    assignees:
      - "bcroc"
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      github-actions-low-risk:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
