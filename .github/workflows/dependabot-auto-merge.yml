name: Dependabot auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'West-Cat-Strategy/open-practice' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Require Dependabot alert lookup token
        env:
          DEPENDABOT_METADATA_TOKEN: "${{ secrets.DEPENDABOT_METADATA_TOKEN }}"
        run: |
          if [ -z "$DEPENDABOT_METADATA_TOKEN" ]; then
            echo "::error::Configure DEPENDABOT_METADATA_TOKEN as a Dependabot secret with Dependabot alerts read access before enabling auto-merge."
            exit 1
          fi

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          alert-lookup: true
          github-token: "${{ secrets.DEPENDABOT_METADATA_TOKEN }}"

      - name: Enable auto-merge for low-risk updates
        if: >
          steps.metadata.outputs.alert-state == '' &&
          steps.metadata.outputs.ghsa-id == '' &&
          (
            (
              steps.metadata.outputs.package-ecosystem == 'github-actions' &&
              (
                steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
                steps.metadata.outputs.update-type == 'version-update:semver-minor'
              )
            ) ||
            (
              steps.metadata.outputs.package-ecosystem == 'npm' &&
              steps.metadata.outputs.dependency-type == 'direct:development' &&
              (
                steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
                steps.metadata.outputs.update-type == 'version-update:semver-minor'
              )
            )
          )
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
        run: |
          gh pr edit "$PR_URL" --add-label "dependencies:auto-merge"
          gh pr merge "$PR_URL" --auto --squash

      - name: Label manual dependency update
        if: >
          steps.metadata.outputs.alert-state != '' ||
          steps.metadata.outputs.ghsa-id != '' ||
          steps.metadata.outputs.update-type == 'version-update:semver-major' ||
          steps.metadata.outputs.dependency-type == 'direct:production' ||
          steps.metadata.outputs.dependency-type == 'indirect'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
        run: gh pr edit "$PR_URL" --add-label "dependencies:manual"
