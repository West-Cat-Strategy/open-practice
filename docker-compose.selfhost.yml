name: open-practice-selfhost

# Single-host self-hosting profile for use behind an operator-managed TLS reverse proxy.
# The local development Compose stack remains docker-compose.yml.

services:
  postgres:
    image: open-practice-postgres:18-alpine-su-exec
    build:
      context: ./docker/postgres
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${OPEN_PRACTICE_SELFHOST_POSTGRES_DB:-open_practice}
      POSTGRES_USER: ${OPEN_PRACTICE_SELFHOST_POSTGRES_USER:-open_practice}
      POSTGRES_PASSWORD: ${OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD:?Set OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD}
    volumes:
      - selfhost-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-open_practice} -d $${POSTGRES_DB:-open_practice}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    command: ["redis-server", "--appendonly", "yes", "--save", ""]
    security_opt:
      - no-new-privileges:true
    volumes:
      - selfhost-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-bucket-init:
    image: open-practice-minio:RELEASE.2025-10-15T17-29-55Z-go1.26.4
    build:
      context: ./docker/minio
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command:
      - |
        bucket="$${S3_BUCKET:-open-practice-documents}"
        mkdir -p "/data/$${bucket}"
        if [ "$(stat -c '%u:%g' /data 2>/dev/null)" != "10001:10001" ]; then
          chown -R 10001:10001 /data
        fi
        test -d "/data/$${bucket}"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    environment:
      S3_BUCKET: ${OPEN_PRACTICE_SELFHOST_S3_BUCKET:-open-practice-documents}
    volumes:
      - selfhost-minio-data:/data

  minio:
    image: open-practice-minio:RELEASE.2025-10-15T17-29-55Z-go1.26.4
    build:
      context: ./docker/minio
    command: server /data --console-address ":9001"
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    environment:
      MINIO_ROOT_USER: ${OPEN_PRACTICE_SELFHOST_S3_ACCESS_KEY:-open_practice}
      MINIO_ROOT_PASSWORD: ${OPEN_PRACTICE_SELFHOST_S3_SECRET_KEY:?Set OPEN_PRACTICE_SELFHOST_S3_SECRET_KEY}
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_SELFHOST_MINIO_HOST_PORT:-39080}:9000"
    volumes:
      - selfhost-minio-data:/data
    depends_on:
      minio-bucket-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        APP_NAME: "@open-practice/database"
    command: ["pnpm", "--filter", "@open-practice/database", "db:migrate"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${OPEN_PRACTICE_SELFHOST_POSTGRES_USER:-open_practice}:${OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD:?Set OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD}@postgres:5432/${OPEN_PRACTICE_SELFHOST_POSTGRES_DB:-open_practice}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        APP_NAME: "@open-practice/api"
    command: ["node", "dist/server.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - DATABASE_URL=postgresql://${OPEN_PRACTICE_SELFHOST_POSTGRES_USER:-open_practice}:${OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD:?Set OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD}@postgres:5432/${OPEN_PRACTICE_SELFHOST_POSTGRES_DB:-open_practice}
      - REDIS_URL=redis://redis:6379/0
      - OPEN_PRACTICE_CONFIG_ENCRYPTION_KEY=${OPEN_PRACTICE_SELFHOST_CONFIG_ENCRYPTION_KEY:?Set OPEN_PRACTICE_SELFHOST_CONFIG_ENCRYPTION_KEY}
      - S3_ENDPOINT=${OPEN_PRACTICE_SELFHOST_S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${OPEN_PRACTICE_SELFHOST_S3_REGION:-local}
      - S3_BUCKET=${OPEN_PRACTICE_SELFHOST_S3_BUCKET:-open-practice-documents}
      - S3_ACCESS_KEY=${OPEN_PRACTICE_SELFHOST_S3_ACCESS_KEY:-open_practice}
      - S3_SECRET_KEY=${OPEN_PRACTICE_SELFHOST_S3_SECRET_KEY:?Set OPEN_PRACTICE_SELFHOST_S3_SECRET_KEY}
      - S3_SERVER_SIDE_ENCRYPTION=AES256
      - AUTH_JWT_SECRET=${OPEN_PRACTICE_SELFHOST_AUTH_JWT_SECRET:?Set OPEN_PRACTICE_SELFHOST_AUTH_JWT_SECRET}
      - SESSION_TTL_HOURS=${OPEN_PRACTICE_SELFHOST_SESSION_TTL_HOURS:-12}
      - WEBAUTHN_RP_ID=${OPEN_PRACTICE_SELFHOST_WEBAUTHN_RP_ID:?Set OPEN_PRACTICE_SELFHOST_WEBAUTHN_RP_ID}
      - WEBAUTHN_ORIGIN=${OPEN_PRACTICE_SELFHOST_PUBLIC_WEB_ORIGIN:?Set OPEN_PRACTICE_SELFHOST_PUBLIC_WEB_ORIGIN}
      - PUBLIC_WEB_BASE_URL=${OPEN_PRACTICE_SELFHOST_PUBLIC_WEB_ORIGIN:?Set OPEN_PRACTICE_SELFHOST_PUBLIC_WEB_ORIGIN}
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_SELFHOST_API_SETUP_HOST_PORT:-34080}:4000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        APP_NAME: "@open-practice/web"
        API_BASE_URL: http://api:4000
        OPEN_PRACTICE_BROWSER_API_MODE: same-origin
        OPEN_PRACTICE_IMAGE_PROFILE: self-host
    command: ["node", "apps/web/server.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=production
      - WEB_PORT=3000
      - API_BASE_URL=http://api:4000
      - OPEN_PRACTICE_BROWSER_API_MODE=same-origin
      - OPEN_PRACTICE_IMAGE_PROFILE=self-host
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_SELFHOST_WEB_HOST_PORT:-33080}:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        APP_NAME: "@open-practice/worker"
    command: ["node", "dist/worker.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${OPEN_PRACTICE_SELFHOST_POSTGRES_USER:-open_practice}:${OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD:?Set OPEN_PRACTICE_SELFHOST_POSTGRES_PASSWORD}@postgres:5432/${OPEN_PRACTICE_SELFHOST_POSTGRES_DB:-open_practice}
      - REDIS_URL=redis://redis:6379/0
      - OPEN_PRACTICE_CONFIG_ENCRYPTION_KEY=${OPEN_PRACTICE_SELFHOST_CONFIG_ENCRYPTION_KEY:?Set OPEN_PRACTICE_SELFHOST_CONFIG_ENCRYPTION_KEY}
      - S3_ENDPOINT=${OPEN_PRACTICE_SELFHOST_S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${OPEN_PRACTICE_SELFHOST_S3_REGION:-local}
      - S3_BUCKET=${OPEN_PRACTICE_SELFHOST_S3_BUCKET:-open-practice-documents}
      - S3_ACCESS_KEY=${OPEN_PRACTICE_SELFHOST_S3_ACCESS_KEY:-open_practice}
      - S3_SECRET_KEY=${OPEN_PRACTICE_SELFHOST_S3_SECRET_KEY:?Set OPEN_PRACTICE_SELFHOST_S3_SECRET_KEY}
      - S3_SERVER_SIDE_ENCRYPTION=AES256
      - WORKER_QUEUES=${OPEN_PRACTICE_SELFHOST_WORKER_QUEUES:-email,inbound_email,ai_triage,ocr,transcription,media}
      - WORKER_CONCURRENCY=${OPEN_PRACTICE_SELFHOST_WORKER_CONCURRENCY:-2}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  selfhost-postgres-data:
  selfhost-minio-data:
  selfhost-redis-data:
