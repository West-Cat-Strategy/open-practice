name: open-practice-dev

# Local development and testing stack.
# Coordination for API, Web, Worker, and Infrastructure services.

services:
  postgres:
    image: open-practice-postgres:18-alpine-su-exec
    build:
      context: ./docker/postgres
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: open_practice
      POSTGRES_USER: open_practice
      POSTGRES_PASSWORD: open_practice
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_POSTGRES_HOST_PORT:-35432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_practice -d open_practice"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.8.0-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_REDIS_HOST_PORT:-36379}:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-bucket-init:
    image: open-practice-minio:RELEASE.2025-10-15T17-29-55Z-go1.26.4
    build:
      context: ./docker/minio
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command:
      - |
        bucket="$${S3_BUCKET:-open-practice-documents}"
        mkdir -p "/data/$${bucket}"
        if [ "$(stat -c '%u:%g' /data 2>/dev/null)" != "10001:10001" ]; then
          chown -R 10001:10001 /data
        fi
        test -d "/data/$${bucket}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    environment:
      S3_BUCKET: open-practice-documents
    volumes:
      - minio-data:/data

  minio:
    image: open-practice-minio:RELEASE.2025-10-15T17-29-55Z-go1.26.4
    build:
      context: ./docker/minio
    command: server /data --console-address ":9001"
    user: "10001:10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MINIO_ROOT_USER: open_practice
      MINIO_ROOT_PASSWORD: open_practice_secret
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_MINIO_HOST_PORT:-39000}:9000"
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_MINIO_CONSOLE_HOST_PORT:-39001}:9001"
    volumes:
      - minio-data:/data
    depends_on:
      minio-bucket-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: open-practice-mailpit:v1.30.2-go1.26.4
    build:
      context: ./docker/mailpit
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_MAILPIT_SMTP_HOST_PORT:-31025}:1025"
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_MAILPIT_WEB_HOST_PORT:-38025}:8025"

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
      args:
        APP_NAME: "@open-practice/database"
    command: ["pnpm", "--filter", "@open-practice/database", "db:migrate"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://open_practice:open_practice@postgres:5432/open_practice
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        APP_NAME: "@open-practice/api"
    command: ["node", "dist/server.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=development
      - API_PORT=4000
      - DATABASE_URL=postgresql://open_practice:open_practice@postgres:5432/open_practice
      - REDIS_URL=redis://redis:6379/0
      - OPEN_PRACTICE_CONFIG_ENCRYPTION_KEY=base64:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=open_practice
      - S3_SECRET_KEY=open_practice_secret
      - AUTH_JWT_SECRET=dev-only-change-me-at-least-16-chars
      - OPEN_PRACTICE_ALLOW_DOCKER_BRIDGE_SETUP=true
      - WEBAUTHN_ORIGIN=${OPEN_PRACTICE_PUBLIC_WEB_ORIGIN:-http://localhost:${OPEN_PRACTICE_DOCKER_WEB_HOST_PORT:-33000}}
      - PUBLIC_WEB_BASE_URL=${OPEN_PRACTICE_PUBLIC_WEB_ORIGIN:-http://localhost:${OPEN_PRACTICE_DOCKER_WEB_HOST_PORT:-33000}}
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_API_HOST_PORT:-34000}:4000"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        APP_NAME: "@open-practice/web"
        OPEN_PRACTICE_RELAXED_CSP: "true"
        OPEN_PRACTICE_DOCKER_LOCAL_DEV: "true"
        OPEN_PRACTICE_IMAGE_PROFILE: "local-dev"
    command: ["node", "apps/web/server.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=development
      - WEB_PORT=3000
      - API_BASE_URL=http://api:4000
      - NEXT_PUBLIC_API_BASE_URL=${OPEN_PRACTICE_PUBLIC_API_ORIGIN:-http://localhost:${OPEN_PRACTICE_DOCKER_API_HOST_PORT:-34000}}
      - OPEN_PRACTICE_RELAXED_CSP=true
      - OPEN_PRACTICE_DOCKER_LOCAL_DEV=true
      - OPEN_PRACTICE_IMAGE_PROFILE=local-dev
    ports:
      - "127.0.0.1:${OPEN_PRACTICE_DOCKER_WEB_HOST_PORT:-33000}:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        APP_NAME: "@open-practice/worker"
    command: ["node", "dist/worker.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://open_practice:open_practice@postgres:5432/open_practice
      - REDIS_URL=redis://redis:6379/0
      - OPEN_PRACTICE_CONFIG_ENCRYPTION_KEY=base64:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=open_practice
      - S3_SECRET_KEY=open_practice_secret
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
