name: open-practice-dev

# Local development and testing stack.
# Coordination for API, Web, Worker, and Infrastructure services.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: open_practice
      POSTGRES_USER: open_practice
      POSTGRES_PASSWORD: open_practice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_practice -d open_practice"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: open_practice
      MINIO_ROOT_PASSWORD: open_practice_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:v1.29.7
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@open-practice/api"
        APP_PATH: "apps/api"
    environment:
      - NODE_ENV=development
      - API_PORT=4000
      - DATABASE_URL=postgresql://open_practice:open_practice@postgres:5432/open_practice
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=open_practice
      - S3_SECRET_KEY=open_practice_secret
      - SMTP_HOST=mailpit
      - AUTH_JWT_SECRET=dev-only-change-me-at-least-16-chars
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@open-practice/web"
        APP_PATH: "apps/web"
    environment:
      - NODE_ENV=development
      - WEB_PORT=3000
      - API_BASE_URL=http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@open-practice/worker"
        APP_PATH: "apps/worker"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://open_practice:open_practice@postgres:5432/open_practice
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=open_practice
      - S3_SECRET_KEY=open_practice_secret
      - SMTP_HOST=mailpit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  redis-data:
