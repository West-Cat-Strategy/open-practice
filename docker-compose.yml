name: open-practice-dev

# Local development and testing stack.
# Coordination for API, Web, Worker, and Infrastructure services.

services:
  postgres:
    image: open-practice-postgres:18-alpine-su-exec
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_DB: open_practice
      POSTGRES_USER: open_practice
      POSTGRES_PASSWORD: open_practice
    ports:
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:35432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_practice -d open_practice"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine@sha256:ad0a6eff0a40304ab1ab4f50f0dc192d82b071e1094eac961bcb6106092f8a4e
    ports:
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:36379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: open-practice-minio:RELEASE.2025-10-15T17-29-55Z-go1.26.4
    build:
      context: ./docker/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: open_practice
      MINIO_ROOT_PASSWORD: open_practice_secret
    ports:
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:39000:9000"
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:39001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: open-practice-mailpit:v1.30.1-go1.26.4
    build:
      context: ./docker/mailpit
    ports:
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:31025:1025"
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:38025:8025"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@open-practice/api"
        APP_PATH: "apps/api"
    command: ["node", "dist/server.js"]
    environment:
      - NODE_ENV=development
      - API_PORT=4000
      - DATABASE_URL=postgresql://open_practice:open_practice@postgres:5432/open_practice
      - REDIS_URL=redis://redis:6379/0
      - OPEN_PRACTICE_CONFIG_ENCRYPTION_KEY=base64:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=open_practice
      - S3_SECRET_KEY=open_practice_secret
      - SMTP_HOST=mailpit
      - AUTH_JWT_SECRET=dev-only-change-me-at-least-16-chars
      - OPEN_PRACTICE_ALLOW_DOCKER_BRIDGE_SETUP=true
      - WEBAUTHN_ORIGIN=http://localhost:33000
      - PUBLIC_WEB_BASE_URL=http://localhost:33000
    ports:
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:34000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:4000/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@open-practice/web"
        APP_PATH: "apps/web"
        OPEN_PRACTICE_RELAXED_CSP: "true"
    command: ["node", "node_modules/next/dist/bin/next", "start", "--port", "3000"]
    environment:
      - NODE_ENV=development
      - WEB_PORT=3000
      - API_BASE_URL=http://api:4000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:34000
      - OPEN_PRACTICE_RELAXED_CSP=true
    ports:
      - "${OPEN_PRACTICE_DOCKER_HOST_BIND:-127.0.0.1}:33000:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: "@open-practice/worker"
        APP_PATH: "apps/worker"
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://open_practice:open_practice@postgres:5432/open_practice
      - REDIS_URL=redis://redis:6379/0
      - OPEN_PRACTICE_CONFIG_ENCRYPTION_KEY=base64:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=open_practice
      - S3_SECRET_KEY=open_practice_secret
      - SMTP_HOST=mailpit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  redis-data:
